<header x-data="{ isScrolled: false, activeSection: 'hero-view-idx' }"
        @scroll.window="isScrolled = window.scrollY > 50"
        :class="isScrolled ? 'bg-[#020617]/85 border-b border-white/5 backdrop-blur-md py-3 shadow-[0_4px_30px_rgba(0,0,0,0.4)]' : 'bg-transparent py-5'" 
        class="fixed top-0 left-0 right-0 z-40 transition-all duration-300 px-6 lg:px-12 flex items-center justify-between gap-6"
        style="transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);">
    
    <!-- Brand Logo / Name -->
    <div class="flex items-center gap-3 group cursor-pointer select-none shrink-0">
        <div class="relative flex items-center justify-center w-9 h-9 transition-transform duration-500 group-hover:rotate-[180deg]">
            <div class="absolute inset-0 bg-cyan-400/30 rounded-lg blur-md opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-pulse"></div>
            <svg class="w-full h-full text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,254,0.6)]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="font-sans font-black text-2xl tracking-wider text-white transition-all duration-300 group-hover:text-gray-200"> 
            NAVIGATEGEM<span class="text-cyan-400 ml-0.5 relative group-hover:drop-shadow-[0_0_12px_rgba(0,242,254,0.8)] transition-all duration-300">CONSULTANT</span>
        </div>
    </div>

    <!-- Navigation Bar Menu -->
    <nav class="w-full max-w-7xl overflow-hidden rounded-2xl border border-white/10 bg-white/[0.03] p-1 shadow-[0_4px_30px_rgba(0,0,0,0.2)] backdrop-blur-md">
        <div class="no-scrollbar flex w-full flex-nowrap items-center justify-start gap-0.5 overflow-x-auto scroll-smooth xl:justify-center xl:gap-1 2xl:gap-1.5">
            <template x-for="item in [
                {url: 'index.html', id: 'hero-view-idx', label: 'HOME', iconClass: 'fa-solid fa-house'},
                {url: 'Journey.html', id: 'about-idx', label: 'ABOUT', iconClass: 'fa-solid fa-compass'},
                {url: 'Solution.html#gem-reg-idx', id: 'gem-reg-idx', label: 'REGISTRATION NOW', iconClass: 'fa-solid fa-file-invoice'},
                {url: 'Solution.html#portfolio-idx', id: 'portfolio-idx', label: 'LIVE PROJECTS', iconClass: 'fa-solid fa-chart-simple'},
                {url: 'Traning.html', id: 'training-node-idx', label: 'TRAINING', iconClass: 'fa-solid fa-book-open'},
                {url: 'Service.html', id: 'service-idx', label: 'SERVICE', iconClass: 'fa-solid fa-toolbox'},
                {url: 'Solution.html', id: 'solution-idx', label: 'GEM SOLUTION', iconClass: 'fa-solid fa-lightbulb'},
                {url: 'Build.html', id: 'contact-idx', label: 'CONTACT', iconClass: 'fa-solid fa-envelope'}
            ]">
                <a :href="item.url"
                   @click="activeSection = item.id"
                   :class="activeSection === item.id 
                           ? 'bg-gradient-to-r from-cyan-400 to-blue-500 text-white shadow-[0_0_12px_rgba(0,242,254,0.4)]' 
                           : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-500 hover:shadow-[0_0_12px_rgba(0,242,254,0.3)]'"
                   class="inline-flex h-auto min-h-[32px] flex-shrink-0 items-center gap-1.5 whitespace-nowrap rounded-full px-2 py-1 text-[9.5px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:px-2.5 xl:text-[10px] 2xl:px-3">

                    <!-- Updated Dynamic FontAwesome Tag -->
                    <i :class="item.iconClass + ' text-[11px] flex-shrink-0'"></i>
                    
                    <span x-text="item.label"></span>
                </a>
            </template>
        </div>
    </nav>
</header>
