<header x-data="{ isScrolled: false }"
        @scroll.window="isScrolled = window.scrollY > 50"
        :class="isScrolled ? 'bg-[#020617]/85 border-b border-white/5 backdrop-blur-md py-3 shadow-[0_4px_30px_rgba(0,0,0,0.4)]' : 'bg-transparent py-5'" 
        class="fixed top-0 left-0 right-0 z-40 transition-all duration-300 px-6 lg:px-12 flex flex-col lg:flex-row items-center justify-between gap-4 lg:gap-6"
        style="transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);">
    
    <!-- Brand Logo / Name (Hamesha Active & Glowing) -->
    <div class="flex items-center gap-3 group cursor-pointer select-none shrink-0" onclick="window.location.href='index.html'">
        <div class="relative flex items-center justify-center w-9 h-9 transition-transform duration-500 group-hover:rotate-[180deg]">
            <!-- Static Glow Effect -->
            <div class="absolute inset-0 bg-cyan-400/30 rounded-lg blur-md opacity-100 animate-pulse"></div>
            <!-- Logo Icon hamesha cyan color aur drop-shadow me rahega -->
            <svg class="w-full h-full text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,254,0.6)]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <!-- Logo Text hamesha glowing cyan rahega bina hover ki dependency ke -->
        <div class="font-sans font-black text-2xl tracking-wider text-white transition-all duration-300"> 
            NAVIGATEGEM<span class="text-cyan-400 ml-1 relative drop-shadow-[0_0_12px_rgba(0,242,254,0.8)]">CONSULTANT</span>
        </div>
    </div>

    <!-- Navigation Bar Menu (No-slider layout, matching index page) -->
    <nav class="w-auto max-w-full rounded-full border border-white/10 bg-white/[0.03] p-1.5 shadow-[0_4px_30px_rgba(0,0,0,0.2)] backdrop-blur-md">
        
        <div class="flex w-full flex-wrap items-center justify-center gap-1 sm:gap-2 md:gap-3 px-1"
             x-data="{ page: window.location.pathname.split('/').pop().toLowerCase() || 'index.html' }">
            
            <!-- HOME -->
            <a href="index.html"
               :class="(page === 'index.html' || page === '') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-solid fa-house text-[11px] flex-shrink-0"></i>
                <span>HOME</span>
            </a>

            <!-- ABOUT US -->
            <a href="about.html"
               :class="(page === 'about.html') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-regular fa-circle-question text-[11px] flex-shrink-0"></i>
                <span>ABOUT US</span>
            </a>

            <!-- REGISTRATION NOW -->
            <a href="project.html"
               :class="(window.location.hash === '#portfolio-idx') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-regular fa-file-lines text-[11px] flex-shrink-0"></i>
                <span>REGISTRATION NOW</span>
            </a>

            <!-- TRAINING -->
            <a href="traning.html"
               :class="(page === 'traning.html') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-solid fa-book-open text-[11px] flex-shrink-0"></i>
                <span>TRAINING</span>
            </a>

            <!-- PROJECTS -->
            <a href="project.html"
               :class="(page === 'project-list.html') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-regular fa-clipboard text-[11px] flex-shrink-0"></i>
                <span>PROJECTS</span>
            </a>

            <!-- SERVICE -->
            <a href="service.html"
               :class="(page === 'service.html') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-solid fa-toolbox text-[11px] flex-shrink-0"></i>
                <span>SERVICE</span>
            </a>

            <!-- GEM SOLUTION -->
            <a href="solution.html"
               :class="(window.location.hash === '#gem-reg-idx') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-solid fa-file-invoice text-[11px] flex-shrink-0"></i>
                <span>GEM SOLUTION</span>
            </a>

            <!-- CONTACT -->
            <a href="contact.html"
               :class="(page === 'contact.html') 
                       ? 'bg-gradient-to-r from-cyan-400 to-blue-600 text-white shadow-[0_0_12px_rgba(0,242,254,0.5)]' 
                       : 'text-slate-300 hover:text-white hover:bg-gradient-to-r hover:from-cyan-400 hover:to-blue-600 hover:shadow-[0_0_12px_rgba(0,242,254,0.5)]'"
               class="inline-flex h-auto min-h-[34px] flex-shrink-0 justify-center items-center gap-2 rounded-full px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 ease-in-out transform hover:scale-105 xl:text-[10.5px]">
                <i class="fa-solid fa-envelope text-[11px] flex-shrink-0"></i>
                <span>CONTACT</span>
            </a>

        </div>
    </nav>
</header>
